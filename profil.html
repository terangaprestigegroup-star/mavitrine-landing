<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>MaVitrine.sn — Mon profil</title>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--g:#1DB954;--gd:#17a349;--gl:rgba(29,185,84,.12);--p:#3D2BE8;--pb:rgba(61,43,232,.08);--o:#F5611A;--ink:#0E0E0F;--ink2:#2D2D30;--ink3:#6E6E78;--sur:#F7F7F8;--line:#E8E8EB;--r:14px;--r2:20px;--shg:0 4px 20px rgba(29,185,84,.35);}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--sur);min-height:100vh;color:var(--ink);-webkit-font-smoothing:antialiased;padding-bottom:80px;}
nav{display:flex;align-items:center;gap:12px;padding:14px 16px;background:white;border-bottom:1px solid var(--line);position:sticky;top:0;z-index:100;}
.nav-back{width:36px;height:36px;background:var(--sur);border:none;border-radius:50%;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.nav-title{font-family:'Bricolage Grotesque',sans-serif;font-size:17px;font-weight:800;}
.card{background:white;border-radius:var(--r2);margin:16px;padding:20px;border:1px solid var(--line);}
.card-title{font-family:'Bricolage Grotesque',sans-serif;font-size:15px;font-weight:700;color:var(--ink);margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--line);}
.field{margin-bottom:14px}
.field label{display:block;font-size:12px;font-weight:600;color:var(--ink2);margin-bottom:6px;}
.field input,.field select,.field textarea{width:100%;padding:12px 14px;border:1.5px solid var(--line);border-radius:var(--r);font-size:14px;font-family:'DM Sans',sans-serif;color:var(--ink);background:var(--sur);outline:none;-webkit-appearance:none;}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--g);background:white;}
.field textarea{resize:none;height:72px;}
.select-wrap{position:relative;}
.select-wrap::after{content:'▼';position:absolute;right:12px;top:50%;transform:translateY(-50%);font-size:10px;color:var(--ink3);pointer-events:none;}
.btn-save{width:100%;padding:14px;background:var(--g);color:white;border:none;border-radius:50px;font-family:'Bricolage Grotesque',sans-serif;font-size:15px;font-weight:700;cursor:pointer;box-shadow:var(--shg);display:flex;align-items:center;justify-content:center;gap:8px;}
.btn-save .spinner{width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:white;border-radius:50%;animation:spin .7s linear infinite;display:none;}
@keyframes spin{to{transform:rotate(360deg)}}
.toast{position:fixed;top:70px;left:16px;right:16px;z-index:300;border-radius:var(--r);padding:12px 16px;font-size:14px;font-weight:600;display:none;align-items:center;gap:8px;}
.toast.show{display:flex;}
.toast-success{background:var(--gl);border:1px solid rgba(29,185,84,.3);color:var(--gd);}
.toast-error{background:#FFF1F1;border:1px solid #FECACA;color:#DC2626;}
.link-preview{background:var(--sur);border-radius:var(--r);padding:12px 14px;display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.link-url{font-size:12px;color:var(--p);font-weight:600;}
.btn-copy{background:var(--pb);color:var(--p);border:none;border-radius:50px;padding:6px 12px;font-size:11px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;}
.section-divider{height:1px;background:var(--line);margin:0 16px;}
.danger-zone{margin:16px;}
.btn-logout{width:100%;padding:14px;background:white;color:#DC2626;border:1.5px solid #FECACA;border-radius:50px;font-family:'Bricolage Grotesque',sans-serif;font-size:15px;font-weight:700;cursor:pointer;}
.confirm-modal{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:600;display:none;align-items:center;justify-content:center;padding:20px}
.confirm-modal.open{display:flex}
.confirm-box{background:white;border-radius:20px;padding:24px;width:100%;max-width:320px;text-align:center}
.confirm-title{font-family:'Bricolage Grotesque',sans-serif;font-size:16px;font-weight:800;margin-bottom:8px}
.confirm-sub{font-size:13px;color:var(--ink3);margin-bottom:20px}
.confirm-btns{display:flex;gap:10px}
.confirm-btn-cancel{flex:1;padding:12px;background:var(--sur);border:1px solid var(--line);border-radius:50px;font-size:14px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif}
.confirm-btn-ok{flex:1;padding:12px;background:#DC2626;color:white;border:none;border-radius:50px;font-size:14px;font-weight:700;cursor:pointer;font-family:'Bricolage Grotesque',sans-serif}
</style>
</head>
<body>
<div class="toast toast-success" id="toast-success">✅ <span id="toast-msg"></span></div>
<div class="toast toast-error" id="toast-error">❌ <span id="toast-err"></span></div>
<nav>
  <button class="nav-back" onclick="retourDashboard()">←</button>
  <div class="nav-title">Mon profil</div>
</nav>

<div class="card">
  <div class="card-title">Mon lien boutique</div>
  <div class="link-preview">
    <div class="link-url" id="link-display">mavitrine.sn/...</div>
    <button class="btn-copy" onclick="copyLink()">Copier</button>
  </div>
  <a href="#" id="btn-voir" target="_blank" style="display:block;text-align:center;color:var(--p);font-size:13px;font-weight:600;text-decoration:none;margin-bottom:4px;">👁️ Voir ma boutique →</a>
</div>

<div class="card">
  <div class="card-title">Informations personnelles</div>
  <div class="field">
    <label>Nom complet *</label>
    <input type="text" id="nom" placeholder="Votre nom">
  </div>
  <div class="field">
    <label>Téléphone de connexion</label>
    <input type="tel" id="telephone" placeholder="77 123 45 67" readonly style="opacity:.6;">
  </div>
</div>

<div class="card">
  <div class="card-title">Ma boutique</div>
  <div class="field">
    <label>Nom de la boutique *</label>
    <input type="text" id="nom_boutique" placeholder="Boutique Aminata">
  </div>
  <div class="field">
    <label>Slogan</label>
    <input type="text" id="slogan" placeholder="Qualité · Confiance · Rapidité">
  </div>
  <div class="field">
    <label>Description</label>
    <textarea id="description" placeholder="Décrivez votre boutique..."></textarea>
  </div>
  <div class="field">
    <label>Ville</label>
    <div class="select-wrap">
      <select id="ville">
        <option value="">Choisir votre ville</option>
        <option>Dakar</option><option>Pikine</option><option>Guédiawaye</option>
        <option>Rufisque</option><option>Bargny</option><option>Diamniadio</option>
        <option>Thiès</option><option>Mbour</option><option>Tivaouane</option>
        <option>Joal-Fadiouth</option><option>Saint-Louis</option><option>Richard-Toll</option>
        <option>Dagana</option><option>Podor</option><option>Touba</option>
        <option>Mbacké</option><option>Diourbel</option><option>Bambey</option>
        <option>Kaolack</option><option>Guinguinéo</option><option>Nioro du Rip</option>
        <option>Fatick</option><option>Foundiougne</option><option>Gossas</option>
        <option>Ziguinchor</option><option>Bignona</option><option>Oussouye</option>
        <option>Kolda</option><option>Vélingara</option><option>Tambacounda</option>
        <option>Bakel</option><option>Kédougou</option><option>Matam</option>
        <option>Louga</option><option>Kébémer</option><option>Linguère</option>
        <option>Sédhiou</option><option>Autre ville</option>
      </select>
    </div>
  </div>
  <div class="field">
    <label>Adresse</label>
    <input type="text" id="adresse" placeholder="Ex: Liberté 6, près du marché">
  </div>
  <div class="field">
    <label>Horaires</label>
    <input type="text" id="horaires" placeholder="Ex: Lun-Sam · 9h–20h">
  </div>
  <button class="btn-save" onclick="sauvegarder()">
    <span id="btn-text">Enregistrer les modifications</span>
    <span class="spinner" id="spinner"></span>
  </button>
</div>

<div class="danger-zone">
  <button class="btn-logout" onclick="confirmerDeconnexion()">🚪 Se déconnecter</button>
</div>

<!-- MODAL CONFIRMATION -->
<div class="confirm-modal" id="confirm-modal">
  <div class="confirm-box">
    <div class="confirm-title">Se déconnecter ?</div>
    <div class="confirm-sub">Vous devrez ressaisir votre code PIN pour vous reconnecter.</div>
    <div class="confirm-btns">
      <button class="confirm-btn-cancel" onclick="document.getElementById('confirm-modal').classList.remove('open')">Annuler</button>
      <button class="confirm-btn-ok" onclick="deconnexion()">Se déconnecter</button>
    </div>
  </div>
</div>

<script>
const API='https://mavitrine-sn-bphm.vercel.app';
let token='',slug='';
window.onload=async()=>{
  token=localStorage.getItem('mv_token');
  if(!token)return window.location.href='connexion.html';
  slug=localStorage.getItem('mv_slug')||'';
  updateLink();
  await charger();
};
function updateLink(){
  const url='https://terangaprestigegroup-star.github.io/mavitrine-landing/vitrine.html?slug='+slug;
  document.getElementById('link-display').textContent='mavitrine.sn/'+slug;
  document.getElementById('btn-voir').href=url;
}
async function charger(){
  try{
    const r=await fetch(API+'/api/auth/moi',{headers:{'Authorization':'Bearer '+token}});
    if(r.status===401)return deconnexion();
    const d=await r.json();
    if(d.user){
      document.getElementById('nom').value=d.user.nom||'';
      document.getElementById('telephone').value=d.user.telephone||'';
      slug=d.user.slug||slug;
      localStorage.setItem('mv_slug',slug);
      updateLink();
    }
    const r2=await fetch(API+'/api/vitrines/moi',{headers:{'Authorization':'Bearer '+token}});
    const d2=await r2.json();
    if(d2.vitrine){
      const v=d2.vitrine;
      document.getElementById('nom_boutique').value=v.nom_boutique||'';
      document.getElementById('slogan').value=v.slogan||'';
      document.getElementById('description').value=v.description||'';
      document.getElementById('ville').value=v.ville||'';
      document.getElementById('adresse').value=v.adresse||'';
      document.getElementById('horaires').value=v.horaires||'';
    }
  }catch(e){}
}
function retourDashboard(){
  if(document.referrer && document.referrer.includes('dashboard')){
    history.back();
  } else {
    window.location.href='dashboard.html';
  }
}
function confirmerDeconnexion(){
  document.getElementById('confirm-modal').classList.add('open');
}
async function sauvegarder(){
  const nom=document.getElementById('nom').value.trim();
  const nomBoutique=document.getElementById('nom_boutique').value.trim();
  if(!nom){showToast('Entrez votre nom complet','error');return;}
  if(!nomBoutique){showToast('Entrez le nom de votre boutique','error');return;}
  const btn=document.getElementById('btn-text');
  const sp=document.getElementById('spinner');
  const submitBtn=btn.closest('button');
  btn.style.display='none';sp.style.display='block';submitBtn.disabled=true;
  try{
    await fetch(API+'/api/auth/moi',{method:'PATCH',headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},body:JSON.stringify({nom:document.getElementById('nom').value.trim()})});
    await fetch(API+'/api/vitrines/moi',{method:'PATCH',headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},body:JSON.stringify({
      nom_boutique:document.getElementById('nom_boutique').value.trim(),
      slogan:document.getElementById('slogan').value.trim(),
      description:document.getElementById('description').value.trim(),
      ville:document.getElementById('ville').value,
      adresse:document.getElementById('adresse').value.trim(),
      horaires:document.getElementById('horaires').value.trim(),
      telephone_public:document.getElementById('telephone').value.trim(),
    })});
    showToast('Profil enregistré ✅','success');
  }catch(e){showToast('Erreur réseau','error');}
  btn.style.display='block';sp.style.display='none';submitBtn.disabled=false;
}
function copyLink(){
  const url='https://terangaprestigegroup-star.github.io/mavitrine-landing/vitrine.html?slug='+slug;
  navigator.clipboard.writeText(url).then(()=>showToast('Lien copié !','success')).catch(()=>{});
}
function showToast(msg,type='success'){
  const el=document.getElementById('toast-'+type);
  document.getElementById(type==='success'?'toast-msg':'toast-err').textContent=msg;
  el.classList.add('show');setTimeout(()=>el.classList.remove('show'),3000);
}
function deconnexion(){
  localStorage.clear();window.location.href='connexion.html';
}
</script>
</body>
</html>
